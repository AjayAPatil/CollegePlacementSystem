<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #drawer class="sidenav" fixedInViewport [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
    [mode]="(isHandset$ | async) ? 'over' : 'side'" [opened]="(isHandset$ | async) === false">
    <mat-toolbar>Menu</mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="/student" routerLinkActive="active">
        Student
      </a>
      <a mat-list-item routerLink="/student/dashboard" routerLinkActive="active">
        Dashboard
      </a>

      <a mat-list-item routerLink="/company" routerLinkActive="active">
        Company
      </a>

      <a mat-list-item routerLink="/admin" routerLinkActive="active">
        Admin
      </a>
      <mat-expansion-panel class="menu-panel" hideToggle>
        <mat-expansion-panel-header>
          <mat-icon>school</mat-icon>
          <span class="menu-title">Student</span>
          <mat-icon class="expand-icon">expand_more</mat-icon>
        </mat-expansion-panel-header>

        <a mat-list-item routerLink="/student/dashboard" routerLinkActive="active">
          Dashboard
        </a>

        <a mat-list-item routerLink="/student/profile" routerLinkActive="active">
          Profile
        </a>

        <a mat-list-item routerLink="/student/skills" routerLinkActive="active">
          Skills
        </a>
      </mat-expansion-panel>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content class="sidenav-content">
    <mat-toolbar color="primary">
      @if (isHandset$ | async) {
      <button type="button" aria-label="Toggle sidenav" matIconButton (click)="drawer.toggle()">
        <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
      </button>
      }
      <span>UI</span>
    </mat-toolbar>
    <!-- Add Content Here -->
  </mat-sidenav-content>
</mat-sidenav-container>
