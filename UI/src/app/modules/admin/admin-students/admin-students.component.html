<div>
    <table mat-table [dataSource]="studentDataSource" class="mat-elevation-z8 demo-table">
  <!-- Position Column -->
  <ng-container matColumnDef="firstName">
    <th mat-header-cell *matHeaderCellDef> FName </th>
    <td mat-cell *matCellDef="let element"> {{element.firstName}} </td>
  </ng-container>

  <!-- Name Column -->
  <ng-container matColumnDef="lastName">
    <th mat-header-cell *matHeaderCellDef> lastName </th>
    <td mat-cell *matCellDef="let element"> {{element.lastName}} </td>
  </ng-container>

  <!-- Name Column -->
  <ng-container matColumnDef="userName">
    <th mat-header-cell *matHeaderCellDef> userName </th>
    <td mat-cell *matCellDef="let element"> {{element.user?.userName}} </td>
  </ng-container>
  <!-- Name Column -->
  <ng-container matColumnDef="passwordHash">
    <th mat-header-cell *matHeaderCellDef> passwordHash </th>
    <td mat-cell *matCellDef="let element"> {{element.user?.passwordHash}} </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="studentTblColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: studentTblColumns;"></tr>
</table>


</div>
